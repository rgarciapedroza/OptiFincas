<div *ngIf="!loadingSession">
  <!-- Mensaje de error para accesos no autorizados (Visible en la pantalla de Login) -->
  <div *ngIf="error && !session" class="container" style="padding-top: 30px; max-width: 700px; margin: 0 auto;">
    <div class="error show" style="text-align: center; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); margin-bottom: 0;">
      {{ error }}
    </div>
  </div>

  <div class="app-layout">
    <!-- SIDEBAR: Visible para todos los usuarios logueados -->
    <aside class="sidebar" *ngIf="session">
      <div class="sidebar-header">
        <img src="assets/logo.png" class="sidebar-logo" alt="OptiFincas">
        <h2 class="sidebar-title">OptiFincas</h2>
      </div>
      <nav>
        <button *ngIf="userRole === 'admin'" class="sidebar-btn" routerLink="/clasificador" routerLinkActive="active">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/></svg>
          <span class="sidebar-label">Clasificador</span>
        </button>
        <button *ngIf="userRole === 'admin'" class="sidebar-btn" routerLink="/comunidades" routerLinkActive="active">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5"/></svg>
          <span class="sidebar-label">Comunidades</span>
        </button>
        <button *ngIf="userRole === 'admin'" class="sidebar-btn" routerLink="/optimizacion" routerLinkActive="active">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7l5-2 5.447 2.724A1 1 0 0121 8.618v10.764a1 1 0 01-1.447.894L15 17l-6 3zM9 7v13m6-15v13"/></svg>
          <span class="sidebar-label">Optimización</span>
        </button>
        <button *ngIf="userRole === 'propietario'" class="sidebar-btn" routerLink="/portal-propietario" routerLinkActive="active">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
          <span class="sidebar-label">Mi Comunidad</span>
        </button>
      </nav>
      <div class="logout-section">
        <button class="sidebar-btn" (click)="logout()" style="color: #ef4444;">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
          <span class="sidebar-label">Salir</span>
        </button>
      </div>
    </aside>

    <!-- CONTENIDO: Siempre se muestra el router-outlet para que funcionen las rutas -->
    <main class="main-content" [class.full-width]="!session || userRole !== 'admin'">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>

<!-- Spinner de carga centralizado -->
<div *ngIf="loadingSession || loading" class="loading-overlay">
  <div class="spinner"></div>
  <p>{{ loadingSession ? 'Iniciando sistema...' : loadingMessage }}</p>
</div>
