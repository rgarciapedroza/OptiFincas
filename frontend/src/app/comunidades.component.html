<!-- Mensaje de error global para este componente -->
<div *ngIf="error" class="error show">{{ error }}</div>

<div class="card-container">
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 1px solid #f1f5f9; padding-bottom: 15px;">
    <h2 class="section-title" style="margin: 0;">Gestión de Comunidades</h2>
    <button class="btn btn-success" (click)="prepararNuevaFinca()" style="border-radius: 20px; padding: 8px 20px; box-shadow: 0 4px 6px -1px rgba(16, 185, 129, 0.2);">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
      Nueva Comunidad
    </button>
  </div>

  <!-- Listado de Comunidades -->
  <h3 class="section-title" style="font-size: 1.1rem;">Comunidades Registradas</h3>
  <table class="movimientos-table" *ngIf="comunidadesDB.length > 0">
    <thead>
      <tr>
        <th>Nombre</th>
        <th>Dirección</th>
        <th>Servicios</th>
        <th style="text-align: center;">Acciones</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let com of comunidadesDB" (click)="verDashboard(com)" style="cursor: pointer;">
        <td style="font-weight: 600;">{{ com.nombre }}</td>
        <td>{{ com.direccion }}</td>
        <td>{{ com.servicios || '-' }}</td>
        <td style="text-align: center; white-space: nowrap;" (click)="$event.stopPropagation()">
          <button class="btn-action btn-edit" (click)="prepararEdicion(com)" title="Editar">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
          </button>
          <button class="btn-action btn-delete" (click)="eliminarComunidad(com.id)" title="Borrar">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
          </button>
        </td>
      </tr>
    </tbody>
  </table>
  <div *ngIf="comunidadesDB.length === 0" class="no-tasks" style="padding: 40px;">
    No hay comunidades registradas.
  </div>
</div>

<!-- MODAL EDICIÓN/CREACIÓN DE COMUNIDAD (OPTIMIZACIÓN) -->
<div class="modal-overlay" *ngIf="mostrarModalEdicionComunidad" style="z-index: 1200;">
  <div class="modal-card" style="max-width: 600px;">
    <div class="modal-header">
      <h3>{{ editandoId ? 'Editar Detalles de Finca' : 'Registrar Nueva Finca' }}</h3>
      <button class="btn-action" (click)="cancelarEdicion()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
      </button>
    </div>

    <div class="modal-body">
      <div class="form-grid-2">
        <div class="form-group" style="grid-column: span 2;">
          <label>Nombre Comunidad *</label>
          <input [(ngModel)]="nuevaComunidadForm.nombre" class="input-concepto-edit" placeholder="Ej: Residencial Alameda">
        </div>
        <div class="form-group" style="grid-column: span 2;">
          <label>Dirección *</label>
          <input [(ngModel)]="nuevaComunidadForm.direccion" class="input-concepto-edit" placeholder="Calle, Número, Localidad...">
        </div>
        <div class="form-group" style="grid-column: span 2;">
          <label>Servicio Principal (Opcional)</label>
          <select [(ngModel)]="nuevaComunidadForm.servicios" class="input-concepto-edit" style="width: 100%; height: 42px;">
            <option value="">Ninguno / Por definir</option>
            <option value="limpieza">Servicio de Limpieza</option>
          </select>
        </div>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn btn-secondary" (click)="cancelarEdicion()">Cancelar</button>
      <button class="btn btn-success" (click)="guardarComunidad()">
        {{ editandoId ? 'Actualizar Finca' : 'Guardar Finca' }}
      </button>
    </div>
  </div>
</div>

<!-- Overlay de carga -->
<div *ngIf="loading" class="loading-overlay">
  <div class="spinner"></div>
  <p style="color: #2c3e50; font-weight: 600;">{{ loadingMessage }}</p>
</div>
